<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPad Web Browser</title>
  <style>
    body { font-family: sans-serif; margin: 0; }
    #controls { padding: 10px; background: #f0f0f0; display: flex; gap: 5px; flex-wrap: wrap; }
    #url { flex: 1; padding: 5px; min-width: 150px; }
    button { padding: 5px 10px; }
    #iframe { width: 100%; height: 90vh; border: none; }
  </style>
</head>
<body>
  <div id="controls">
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="goForward()">➡ Forward</button>
    <button onclick="reloadPage()">🔄 Reload</button>
    <input type="text" id="url" placeholder="Enter URL or search" value="https://www.google.com">
    <button onclick="navigate()">Go</button>
  </div>
  <iframe id="iframe" src="https://www.google.com"></iframe>
  <script src="script.js"></script>
</body>
</html>
